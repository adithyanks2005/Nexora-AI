name: Build & Release APK

on:
  push:
    tags:
      - 'v*'          # Trigger on version tags like v1.0.0, v1.1.0
  workflow_dispatch:   # Also allow manual trigger from GitHub UI

jobs:
  build:
    name: Build Signed APK & AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/nexora-release.jks

      - name: Create local.properties
        run: |
          cat > android/local.properties <<EOF
          STORE_FILE=app/nexora-release.jks
          STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Build Release AAB (for future Play Store)
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep versionName android/app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexora-ai-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "Nexora AI v${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🩺 Nexora AI v${{ steps.version.outputs.VERSION }}

            **AI-powered healthcare assistant — free to download and use.**

            ### What's new
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ### Install
            1. Download `nexora-ai.apk` below
            2. On your Android phone: Settings → Security → Allow unknown sources
            3. Open the downloaded APK to install

            > Requires Android 5.0 (Lollipop) or higher.
          files: |
            android/app/build/outputs/apk/release/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
